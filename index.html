<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Tic Tac Toe</title>
    <link rel="stylesheet" href="style.css" />
</head>
<body>
    <nav>
        <ul>
         <li>Mytictactoe.com</li>
        </ul>
    </nav>
    <div class="maingame">
        <div class="gamebox">
            <div class="box bt-0 bl-0"><span class="ele"></span></div>
            <div class="box bt-0"><span class="ele"></span></div>
            <div class="box bt-0 br-0"><span class="ele"></span></div>
            <div class="box bl-0"><span class="ele"></span></div>
            <div class="box"><span class="ele"></span></div>
            <div class="box br-0"><span class="ele"></span></div>
            <div class="box bl-0 bb-0"><span class="ele"></span></div>
            <div class="box bb-0"><span class="ele"></span></div>
            <div class="box bb-0 br-0"><span class="ele"></span></div>
        </div>
        <div class="gameinfo">
            <h1 class="wel">Welcome to tictactoe !</h1>
            <div class="reset">
                <span id="chan">Turn of X</span>
                <button id="resu">Reset </button>
            </div>
          
        </div>
    </div>
    <script src="script.js"></script>
</body>
</html>
